<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Days Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Color Days Counter</h1>
  <h2 id="className">Class: Loading...</h2>

  <table>
    <thead>
      <tr>
        <th>Points</th>
        <th>Students</th>
        <th>Teachers</th>
      </tr>
    </thead>
    <tbody id="counterTable">
      <!-- Static rows for points 0 to 6, dynamically filled with data -->
      <tr>
        <td>0</td>
        <td id="student0">0</td>
        <td id="teacher0">0</td>
      </tr>
      <tr>
        <td>1</td>
        <td id="student1">0</td>
        <td id="teacher1">0</td>
      </tr>
      <tr>
        <td>2</td>
        <td id="student2">0</td>
        <td id="teacher2">0</td>
      </tr>
      <tr>
        <td>3</td>
        <td id="student3">0</td>
        <td id="teacher3">0</td>
      </tr>
      <tr>
        <td>4</td>
        <td id="student4">0</td>
        <td id="teacher4">0</td>
      </tr>
      <tr>
        <td>5</td>
        <td id="student5">0</td>
        <td id="teacher5">0</td>
      </tr>
      <tr>
        <td>6</td>
        <td id="student6">0</td>
        <td id="teacher6">0</td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <td><strong>Total</strong></td>
        <td id="studentTotal">0</td>
        <td id="teacherTotal">0</td>
      </tr>
    </tfoot>
  </table>

  <h3>Student Buttons</h3>
  <div id="studentButtons"></div>

  <h3>Teacher Buttons</h3>
  <div id="teacherButtons"></div>

  <p style="margin-top: 2rem;"><a href="menu.html">Back to Class Selection</a></p>

  <script src="script.js"></script>
</body>
</html>
