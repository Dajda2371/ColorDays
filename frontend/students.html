<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Configuration</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>

<body>
  <!-- Container for Left Side Elements (User Info and Language Toggle) -->
  <div id="leftSideContainer">
    <!-- Element to display the logged-in username -->
    <div id="loggedInUser">
      <div id="profileCircle"></div>
      <span id="usernameText"></span>
    </div>
    <!-- Language Toggle -->
    <div id="languageToggle">
      <span id="toggleCs" data-lang="cs">Čeština</span>
      <span id="toggleEn" data-lang="en">English</span>
    </div>
  </div>

  <!-- Container for Header Buttons -->
  <div id="headerButtons">
    <button id="backButton" class="header-button" onclick="window.location.href='classes.html'"
      data-translate-key="backToMenuButtonText">Back to Classes</button>
    <button id="logoutButton" class="header-button" data-translate-key="logoutButtonText">Logout</button>
  </div>

  <!-- Main Content Container -->
  <div id="mainContent">
    <!-- Headers removed -->

    <section class="mt-2rem">
      <h2>Student List</h2>
      <div class="table-wrapper" id="students-table-wrapper">
        <table id="students-table">
          <thead>
            <tr>
              <th>Code</th>
              <th>Class</th>
              <th>Note</th>
              <th>Counting Classes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="students-table-body">
            <!-- Student data will be dynamically added here -->
          </tbody>
        </table>
      </div>
      <button class="class-button" onclick="addStudentConfiguration()">Add Student</button>
    </section>
  </div>

  <!-- QR Code Modal -->
  <div id="qrModal" class="qr-modal-overlay">
    <div class="qr-modal-content">
      <span id="closeQrModal" class="qr-modal-close">&times;</span>
      <div id="qrNote" class="qr-modal-note"></div>
      <div id="qrcode" class="flex-center"></div>
      <div id="qrUrl" class="qr-modal-url"></div>
    </div>
  </div>
  <script src="students.js"></script>
</body>

</html>
