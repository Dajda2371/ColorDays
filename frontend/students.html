<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Configuration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Students</h1>
  <p>This page lists student configurations for counting specific classes.</p>

  <section style="margin-top: 2rem;">
    <h2>Student List</h2>
    <table id="students-table">
      <thead>
        <tr>
          <th>Code</th>
          <th>Class</th>
          <th>Note</th>
          <th>Counting Classes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="students-table-body">
        <!-- Student data will be dynamically added here -->
      </tbody>
    </table>
    <button onclick="addStudentConfiguration()">Add Student</button>
  </section>
  <p style="margin-top: 2rem;"><a href="menu.html">Back to Class Selection</a></p>
  <script src="students.js"></script>
</body>
</html>
