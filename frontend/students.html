<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Configuration</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
  <h1>Students</h1>
  <p>This page lists student configurations for counting specific classes.</p>

  <section style="margin-top: 2rem;">
    <h2>Student List</h2>
    <table id="students-table">
      <thead>
        <tr>
          <th>Code</th>
          <th>Class</th>
          <th>Note</th>
          <th>Counting Classes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="students-table-body">
        <!-- Student data will be dynamically added here -->
      </tbody>
    </table>
    <button class="class-button" onclick="addStudentConfiguration()">Add Student</button>
  </section>
  <p style="margin-top: 2rem;"><a href="classes.html">Back to Classes</a></p>

  <!-- QR Code Modal -->
  <div id="qrModal" style="display:none; position:fixed; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
    <div style="background:#fff; padding:2rem; border-radius:8px; position:relative; text-align:center;">
      <span id="closeQrModal" style="position:absolute; right:1rem; top:1rem; cursor:pointer; font-size:1.5rem;">&times;</span>
      <div id="qrcode"></div>
      <div id="qrUrl" style="margin-top:1rem; font-size:0.9rem; word-break:break-all;"></div>
    </div>
  </div>
  <script src="students.js"></script>
</body>
</html>
