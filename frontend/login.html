<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Color Days</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Login to Color Days Counter</h1>
    <div id="login-sections-container">
        <section>
            <h2>Login as Student</h2>
            <form id="studentLoginForm">
                <div>
                    <label for="code">Code:</label>
                    <input type="text" id="code" name="code" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
        </section>
        <section>
            <h2>Login as Teacher</h2>
            <button onclick="window.location.href='/login/google'" class="btn-google">Login with Google</button>
            <p class="text-separator">or</p>
            <form id="loginForm" class="mt-1rem">
                <div>
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
        </section>
    </div>
    <div id="error-message"></div>
    <script src="login.js"></script>
</body>

</html>
