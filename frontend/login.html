<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate-key="loginTitle">Login - Color Days</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 data-translate-key="loginHeading">Login to Color Days Counter</h1>
    <div id="login-sections-container">
        <section>
            <h2 data-translate-key="loginAsStudent">Login as Student</h2>
            <form id="studentLoginForm">
                <div>
                    <label for="code" data-translate-key="codeLabel">Code:</label>
                    <input type="text" id="code" name="code" required>
                </div>
                <button type="submit" class="btn-primary" data-translate-key="loginButton">Login</button>
            </form>
        </section>
        <section>
            <h2 data-translate-key="loginAsTeacher">Login as Teacher</h2>
            <button onclick="window.location.href='/login/google'" class="btn-google" data-translate-key="loginWithGoogle">Login with Google</button>
            <p class="text-separator" data-translate-key="orText">or</p>
            <form id="loginForm" class="mt-1rem">
                <div>
                    <label for="username" data-translate-key="usernameLabel">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div>
                    <label for="password" data-translate-key="passwordLabel">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-primary" data-translate-key="loginButton">Login</button>
            </form>
        </section>
    </div>
    <div id="error-message"></div>
    <script src="login.js"></script>
</body>

</html>
