<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-translate-key="configTitle">User Configuration</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Container for Left Side Elements (User Info and Language Toggle) -->
  <div id="leftSideContainer">
    <!-- Element to display the logged-in username -->
    <div id="loggedInUser">
      <div id="profileCircle"></div>
      <span id="usernameText"></span>
    </div>
    <!-- Language Toggle -->
    <div id="languageToggle">
      <span id="toggleCs" data-lang="cs">Čeština</span>
      <span id="toggleEn" data-lang="en">English</span>
    </div>
  </div>

  <!-- Container for Header Buttons -->
  <div id="headerButtons">
    <button id="backButton" class="header-button" onclick="window.location.href='menu.html'"
      data-translate-key="backToMenuButtonText">Back to Menu</button>
    <button id="logoutButton" class="header-button" data-translate-key="logoutButtonText">Logout</button>
  </div>

  <!-- Main Content Container -->
  <div id="mainContent">
    <!-- Header removed -->

    <!-- <section>
    <h2>Add User</h2>
    <input type="text" id="newUsername" placeholder="Username" data-translate-key="usernamePlaceholder" />
    <input type="password" id="newPassword" placeholder="Password" data-translate-key="passwordPlaceholder" />
  </section> -->

    <!-- <section>
    <h2>Change Password</h2>
    <input type="text" id="changeUsername" placeholder="Username" data-translate-key="usernamePlaceholder" />
    <input type="password" id="changePassword" placeholder="New Password" data-translate-key="newPasswordPlaceholder" />
    <button onclick="changePassword()">Change Password</button>
  </section> -->

    <section>
      <h2 data-translate-key="userManagementHeading">User Management</h2>
      <ul id="userList"></ul>
      <div class="table-wrapper">
        <table id="userTable" border="0" cellspacing="0" cellpadding="8">
          <thead>
            <tr>
              <th data-translate-key="usernameHeader">Username</th>
              <th data-translate-key="passwordStatusHeader">Password Status</th>
              <th data-translate-key="actionsHeader">Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- JS will populate this -->
          </tbody>
        </table>
      </div>
      <button onclick="addUser()" data-translate-key="addUserBtnText">Add User</button>
    </section>

    <section>
      <h2 data-translate-key="classManagementHeading">Class Management</h2>
      <ul id="classList"></ul>
      <div class="table-wrapper">
        <table id="classTable" border="0" cellspacing="0" cellpadding="8">
          <thead>
            <tr>
              <th data-translate-key="classHeader">Class</th>
              <th data-translate-key="teacherHeader">Teacher</th>
              <th class="narrow-col" data-translate-key="countsHeader">Counts</th>
              <th data-translate-key="actionsHeader">Actions</th>
            </tr>
          </thead>
          <tbody id="classTableBody">
            <!-- JS will populate this -->
          </tbody>
        </table>
      </div>

      <button onclick="handleAddClassRow()" data-translate-key="addClassBtnText">Add Class</button>
      <button onclick="prefillClasses()" data-translate-key="prefillClassesBtnText">Prefill Classes from
        Website</button>
    </section>

    <section>
      <h2 data-translate-key="oauthManagementHeading">Oauth Management</h2>
      <h3>Google</h3>
      <toggle>
        <label for="googleOauth" data-translate-key="enableOauthLabel">Enable:</label> <input type="checkbox"
          id="googleOauth" /> <br>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th data-translate-key="domainHeader">domain</th>
                <th data-translate-key="actionsHeader">Actions</th>
              </tr>
            </thead>
            <tbody id="googleOauthTableBody">
              <!-- Domains will be populated by config.js -->
            </tbody>
          </table>
        </div>
        <button onclick="addGoogleOauthDomain()" data-translate-key="addDomainBtnText">Add Domain</button>
    </section>

  </div>

  <script src="config.js"></script>
</body>

</html>
