<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Configuration</title>
  <link rel="stylesheet" href="style.css" />
  </head>

<body>
  <!-- Container for Left Side Elements (User Info and Language Toggle) -->
  <div id="leftSideContainer">
    <!-- Element to display the logged-in username -->
    <div id="loggedInUser">
      <div id="profileCircle"></div>
      <span id="usernameText"></span>
    </div>
    <!-- Language Toggle -->
    <div id="languageToggle">
      <span id="toggleCs" data-lang="cs">Čeština</span>
      <span id="toggleEn" data-lang="en">English</span>
    </div>
  </div>

  <!-- Container for Header Buttons -->
  <div id="headerButtons">
    <button id="backButton" class="header-button" onclick="window.location.href='menu.html'"
      data-translate-key="backToMenuButtonText">Back to Menu</button>
    <button id="logoutButton" class="header-button" data-translate-key="logoutButtonText">Logout</button>
  </div>

  <!-- Main Content Container -->
  <div id="mainContent">
  <h1>Configuration Page</h1>

  <!-- <section>
    <h2>Add User</h2>
    <input type="text" id="newUsername" placeholder="Username" />
    <input type="password" id="newPassword" placeholder="Password" />
  </section> -->

  <!-- <section>
    <h2>Change Password</h2>
    <input type="text" id="changeUsername" placeholder="Username" />
    <input type="password" id="changePassword" placeholder="New Password" />
    <button onclick="changePassword()">Change Password</button>
  </section> -->

  <section>
    <h2>User Management</h2>
    <ul id="userList"></ul>
    <div class="table-wrapper">
      <table id="userTable" border="0" cellspacing="0" cellpadding="8">
        <thead>
          <tr>
            <th>Username</th>
            <th>Password Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="userTableBody">
          <!-- JS will populate this -->
        </tbody>
      </table>
    </div>
    <button onclick="addUser()">Add User</button>
  </section>

  <section>
    <h2>Class Management</h2>
    <ul id="classList"></ul>
    <div class="table-wrapper">
      <table id="classTable" border="0" cellspacing="0" cellpadding="8">
        <thead>
          <tr>
            <th>Class</th>
            <th>Teacher</th>
            <th>Counts</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="classTableBody">
          <!-- JS will populate this -->
        </tbody>
      </table>
    </div>

    <button onclick="handleAddClassRow()">Add Class</button>
    <button onclick="prefillClasses()">Prefill Classes from Website</button>
  </section>

  <section>
    <h2>Oauth Management</h2>
    <h3>Google</h3>
    <toggle>
      <label for="googleOauth">Enable:</label> <input type="checkbox" id="googleOauth" /> <br>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>domain</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="googleOauthTableBody">
            <!-- Domains will be populated by config.js -->
          </tbody>
        </table>
      </div>
      <button onclick="addGoogleOauthDomain()">Add Domain</button>
  </section>

  </div>

  <script src="config.js"></script>
</body>

</html>
