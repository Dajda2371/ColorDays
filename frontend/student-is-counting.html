<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Configuration</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Container for Left Side Elements (User Info and Language Toggle) -->
  <div id="leftSideContainer">
    <!-- Element to display the logged-in username -->
    <div id="loggedInUser">
      <div id="profileCircle"></div>
      <span id="usernameText"></span>
    </div>
    <!-- Language Toggle -->
    <div id="languageToggle">
      <span id="toggleCs" data-lang="cs">Čeština</span>
      <span id="toggleEn" data-lang="en">English</span>
    </div>
  </div>

  <!-- Container for Header Buttons -->
  <div id="headerButtons">
    <button id="backButton" class="header-button" onclick="window.location.href='students.html'"
      data-translate-key="backToMenuButtonText">Back to Students</button>
    <button id="logoutButton" class="header-button" data-translate-key="logoutButtonText">Logout</button>
  </div>

  <!-- Main Content Container -->
  <div id="mainContent">
    <h1 id="pageTitle">Loading...</h1>

    <section class="mt-2rem">
      <div class="table-wrapper">
        <table id="student-is-counting-table">
          <thead>
            <tr>
              <th>Class</th>
              <th class="narrow-col">Counts</th>
              <th>Is Counted By</th>
            </tr>
          </thead>
          <tbody id="student-is-counting-table-body">
            <!-- Student data will be dynamically added here -->
          </tbody>
        </table>
      </div>
    </section>
  </div>
  <script src="student-is-counting.js"></script>
</body>

</html>
