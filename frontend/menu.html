<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Days - Menu</title>
  <link rel="stylesheet" href="style.css"> <!-- Assuming you have a style.css -->
  <style>
    /* Reuse global styles where possible, override for specific layout needs */

    .classList {
      list-style: none;
      padding: 0;
      margin-top: 1rem;
    }

    .classList li {
      margin-bottom: 10px;
    }

    .classList a {
      display: inline-block;
      padding: 12px 20px;
      background-color: #f8f9fa;
      border: 1px solid #ccc;
      text-decoration: none;
      color: #333;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      box-sizing: border-box;
      max-width: 300px;
      /* Prevent them from being too wide on desktop */
    }

    .classList a:hover {
      background-color: #007bff;
      color: white;
      border-color: #0056b3;
      transform: translateY(-1px);
    }

    .classList a:focus {
      outline: 2px solid #007bff;
      outline-offset: 2px;
    }

    /* --- Style for the Left-Side Container (for User and Language) --- */
    #leftSideContainer {
      position: fixed;
      top: 15px;
      left: 15px;
      padding: 15px;
      border: 1px solid #e0e0e0;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      /* Slightly stronger shadow */
      border-radius: 8px;
      background-color: white;
      z-index: 1000;
    }

    /* --- Style for the Language Toggle --- */
    #languageToggle {
      display: flex;
      border: 1px solid #ced4da;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
      background-color: #fff;
    }

    #languageToggle span {
      flex-grow: 1;
      text-align: center;
      padding: 8px 12px;
      cursor: pointer;
      background-color: #f8f9fa;
      color: #495057;
      transition: all 0.2s ease;
      user-select: none;
      font-size: 0.9rem;
    }

    #languageToggle span.active {
      background-color: #007bff;
      color: white;
      font-weight: 600;
    }

    /* Style for the main content container */
    #mainContent {
      max-width: 800px;
      padding: 20px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      box-sizing: border-box;
      width: 100%;
    }

    /* --- Style for the Header Buttons Container --- */
    #headerButtons {
      position: fixed;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 10px;
      z-index: 1000;
      flex-wrap: wrap;
      /* Allow wrapping if needed on medium screens */
      justify-content: flex-end;
    }

    .header-button {
      padding: 10px 15px;
      cursor: pointer;
      background-color: #f8f9fa;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: all 0.2s ease;
      font-size: 0.9rem;
      min-height: 40px;
    }

    .header-button:hover {
      background-color: #e2e6ea;
    }

    body {
      padding-top: 100px;
      /* Ensure content is visible below fixed headers */
      padding-left: 0;
      background-color: #fdfdfd;
    }

    #loggedInUser {
      display: flex;
      align-items: center;
      font-weight: 600;
      color: #333;
      font-size: 0.95rem;
    }

    #profileCircle {
      width: 32px;
      height: 32px;
      background-color: #adb5bd;
      border-radius: 50%;
      margin-right: 10px;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      #leftSideContainer {
        position: static;
        margin: 0 auto 15px auto;
        width: 90%;
        /* Center with some margin */
        max-width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        /* Center content inside */
      }

      #loggedInUser {
        margin-bottom: 10px;
        width: 100%;
        justify-content: center;
      }

      #languageToggle {
        width: 100%;
      }

      #headerButtons {
        position: static;
        flex-direction: column;
        /* Stack buttons vertically */
        width: 90%;
        margin: 0 auto 20px auto;
        max-width: 400px;
        gap: 8px;
      }

      .header-button {
        width: 100%;
        /* Full width buttons */
        text-align: center;
        padding: 12px;
      }

      #mainContent {
        position: static;
        transform: none;
        width: 100%;
        padding: 10px;
      }

      body {
        padding-top: 10px;
        padding-bottom: 30px;
      }
    }
  </style>
</head>

<body>
  <!-- Container for Left Side Elements (User Info and Language Toggle) -->
  <div id="leftSideContainer">
    <!-- Element to display the logged-in username -->
    <div id="loggedInUser">
      <div id="profileCircle"></div>
      <span id="usernameText"></span>
    </div>
    <!-- Language Toggle -->
    <div id="languageToggle">
      <span id="toggleCs" data-lang="cs">Čeština</span>
      <span id="toggleEn" data-lang="en">English</span>
    </div>
  </div>

  <!-- Container for Header Buttons -->
  <div id="headerButtons">
    <!-- Classes Button (Links to classes.html) -->
    <button id="classesButton" class="header-button" onclick="window.location.href='classes.html'"
      data-translate-key="classesButtonText">Classes</button>
    <button id="configButton" class="header-button" onclick="window.location.href='config.html'"
      data-translate-key="configButtonText">Config</button>
    <!-- Change Password Button -->
    <button id="changePasswordBtn" class="header-button" onclick="window.location.href='change-password.html'"
      data-translate-key="changePasswordButtonText">Change Password</button>
    <!-- Logout Button -->
    <button id="logoutButton" class="header-button" data-translate-key="logoutButtonText">Logout</button>
  </div>

  <!-- Main Content Container -->
  <div id="mainContent">
    <h1 data-translate-key="mainHeading">Color Days Counter</h1>
    <h2 data-translate-key="selectClassSubheading">Select Your Class:</h2>

    <div id="dynamicClassList">
      <!-- Class sections (Monday, Tuesday, Wednesday) will be populated here by JavaScript -->
    </div>
  </div>

  <script src="menu.js"></script> <!-- Assuming you have a menu.js for the JavaScript logic -->
</body>

</html>
