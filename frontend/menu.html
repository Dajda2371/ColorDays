<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Class - Color Days</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Add specific styles for the menu if needed */
    .classList {
      list-style: none;
      padding: 0;
      margin-top: 1rem;
    }
    .classList li {
      margin-bottom: 10px;
    }
    .classList a {
      display: inline-block;
      padding: 10px 25px;
      background-color: #eee;
      border: 1px solid #ccc;
      text-decoration: none;
      color: #333;
      border-radius: 5px;
      transition: background-color 0.2s ease;
    }
    .classList a:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>

  <h1>Color Days Counter</h1>
  <h2>Select Your Class:</h2>

  <ul class="classList">
    <!-- Add list items for each class you want -->
    <li><a href="index.html?class=C1">Class 1</a></li>
    <li><a href="index.html?class=C2">Class 2</a></li>
    <li><a href="index.html?class=C3">Class 3</a></li>
    <!-- Add more classes as needed -->
  </ul>

</body>
</html>
