<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Days - Menu</title>
    <link rel="stylesheet" href="style.css"> <!-- Assuming you have a style.css -->
    <style>
        /* Existing styles */
        .classList {
          list-style: none;
          padding: 0;
          margin-top: 1rem;
        }
        .classList li {
          margin-bottom: 10px;
        }
        .classList a {
          display: inline-block;
          padding: 10px 25px;
          background-color: #eee;
          border: 1px solid #ccc;
          text-decoration: none;
          color: #333;
          border-radius: 5px;
          transition: background-color 0.2s ease;
        }
        .classList a:hover {
          background-color: #ddd;
        }

        /* --- Style for the Header Buttons Container --- */
        #headerButtons {
            position: fixed;   /* Position container relative to the viewport */
            top: 15px;         /* Distance from the top edge */
            right: 15px;        /* Distance from the right edge */
            display: flex;     /* Arrange buttons horizontally */
            gap: 10px;         /* Space between the buttons */
            z-index: 1000;     /* Ensure it stays on top of other content */
        }
        /* --- End Header Buttons Container Style --- */

        /* --- Common Style for Buttons within the Container --- */
        .header-button {
            padding: 8px 15px; /* Adjust padding as needed */
            cursor: pointer;
            background-color: #f0f0f0; /* Optional: style it */
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        /* --- End Common Button Style --- */

        /* Remove specific fixed positioning from individual logout button ID */
        #logoutButton {
            /* No fixed positioning needed here anymore */
        }

        /* Add some padding to the body so content doesn't start under the fixed buttons */
        body {
            padding-top: 60px; /* Adjust this value based on button height + desired space */
            padding-left: 15px; /* Add some padding on the left for the username */
        }

        #loggedInUser {
          display: flex; /* Arrange circle and username side-by-side */
          align-items: center; /* Vertically align items in the middle */
          position: fixed;
          top: 20px; /* Fine-tuned for axis alignment with buttons */
          left: 20px;
          font-weight: bold;
          color: #333; /* Or your preferred color */
        }

        #profileCircle {
          width: 30px; /* Adjust size as needed */
          height: 30px; /* Adjust size as needed */
          background-color: #ccc; /* Gray color */
          border-radius: 50%; /* Makes it a circle */
          margin-right: 15px; /* Space between circle and username */
        }
    </style>
</head>
<body>
  <!-- Element to display the logged-in username -->
  <div id="loggedInUser">
    <div id="profileCircle"></div>
    <span id="usernameText"></span>
  </div>

  <!-- Container for Header Buttons -->
  <div id="headerButtons">
    <!-- Classes Button (Links to classes.html) -->
    <button id="classesButton" class="header-button" onclick="window.location.href='classes.html'">Classes</button>
    <button id="configButton" class="header-button" onclick="window.location.href='config.html'">Config</button>
    <!-- Change Password Button -->
    <button id="changePasswordBtn" class="header-button" onclick="window.location.href='change-password.html'">Change Password</button>
    <!-- Logout Button -->
    <button id="logoutButton" class="header-button">Logout</button>
  </div>

  <h1>Color Days Counter</h1>
  <h2>Select Your Class:</h2>

    <ul class="classList" id="dynamicClassList">
      <!-- Classes will be populated here by JavaScript -->
    </ul>

    <script>
        const dynamicClassList = document.getElementById('dynamicClassList');
        const logoutButton = document.getElementById('logoutButton');
        const classesButton = document.getElementById('classesButton'); // Get the Classes button
        const configButton = document.getElementById('configButton'); // Get the Config button
        // No need to get configButton unless you add specific JS logic for it

        // --- Logout Functionality (Keep this as is) ---
        async function handleLogout() {
            console.log("Attempting logout...");
            try {
                const response = await fetch('/logout', {
                    method: 'POST',
                    credentials: 'include' // Important for sending/receiving cookies
                });

                if (response.ok) {
                    console.log("Logout successful on server. Redirecting to login.");
                    // Redirect to login page after successful logout
                    window.location.href = '/login.html';
                } else {
                    // Try to parse error message if available
                    const result = await response.json().catch(() => ({})); // Default to empty object if JSON fails
                    console.error('Logout request failed:', response.status, result.error || 'Unknown server error');
                    alert(`Logout failed: ${result.error || 'Server error'}`);
                }
            } catch (error) {
                console.error('Error during logout fetch:', error);
                alert('An error occurred during logout. Please check your connection.');
            }
        }

        logoutButton.addEventListener('click', handleLogout);
        // --- END Logout Functionality ---

        // --- Function to fetch and display classes ---
        async function loadAndDisplayClasses() {
            try {
                const response = await fetch('/api/classes', {
                    credentials: 'include' // Important if your API endpoint is protected
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ error: "Failed to fetch classes" }));
                    throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                }

                const classes = await response.json();
                dynamicClassList.innerHTML = ''; // Clear any existing static items

                classes.forEach(cls => {
                    const listItem = document.createElement('li');
                    listItem.innerHTML = `<a href="index.html?class=${encodeURIComponent(cls.class)}">${cls.class}</a>`;
                    dynamicClassList.appendChild(listItem);
                });

            } catch (error) {
                console.error('Error loading classes:', error);
                dynamicClassList.innerHTML = `<li>Error loading classes: ${error.message}. Please try again later or contact support.</li>`;
            }
        }

        // --- Function to display logged-in username ---
        function displayLoggedInUser() {
          const cookies = document.cookie.split('; ');
          const usernameCookie = cookies.find(row => row.startsWith('ColorDaysUser='));
          const usernameTextSpan = document.getElementById('usernameText');

          if (usernameCookie) {
            const username = usernameCookie.split('=')[1];
            usernameTextSpan.textContent = decodeURIComponent(username);
          } else {
          usernameTextSpan.textContent = 'Not Logged In'; // Fallback, circle will still show
          }
        }

        // Helper function to get a specific cookie by name
        function getCookie(name) {
          const nameEQ = name + "=";
          const ca = document.cookie.split(';');
          for(let i = 0; i < ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) === ' ') c = c.substring(1, c.length); // trim leading spaces
            if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length); // Return cookie value
          }
          return null; // Cookie not found
        }

        // --- Function to manage visibility of Admin/Teacher buttons for students ---
        function manageStudentButtonVisibility() {
            console.log("--- manageStudentButtonVisibility ---");
            const studentAuthCookie = getCookie("SQLAuthUserStudent");
            const isStudent = studentAuthCookie !== null;
            console.log(`SQLAuthUserStudent cookie exists: ${isStudent}`);

            if (isStudent) {
                console.log("Student session detected. Hiding Classes and Config buttons.");
                if (classesButton) classesButton.style.display = 'none';
                if (configButton) configButton.style.display = 'none';
            }
            console.log("--- End manageStudentButtonVisibility ---");
        }

        // --- Function to manage visibility of Change Password button based on SQLAuthUser cookie ---
        function manageChangePasswordButtonVisibility() {
          console.log("--- manageChangePasswordButtonVisibility ---");
          console.log("Raw document.cookie:", `'${document.cookie}'`);

          const cookieName = "SQLAuthUser"; // The name of the cookie we're looking for
          const sqlAuthCookieValue = getCookie(cookieName);
          const cookieExists = sqlAuthCookieValue !== null;

          console.log(`Cookie '${cookieName}' value (via getCookie): ${sqlAuthCookieValue}`);
          console.log(`'${cookieName}' cookie exists status (based on getCookie): ${cookieExists}`);

          // Select the button using its new unique ID
          const changePasswordButton = document.getElementById('changePasswordBtn');
          console.log("Change Password button element selected by ID:", changePasswordButton);

          if (changePasswordButton) {
            if (cookieExists) {
              console.log(`SQLAuthUser cookie IS present (value: ${sqlAuthCookieValue}). Showing Change Password button.`);
              changePasswordButton.style.display = ''; // Revert to default/stylesheet display (e.g., inline-block)
            } else { // SQLAuthUser cookie does NOT exist
              console.log("SQLAuthUser cookie is NOT present. Hiding Change Password button.");
              changePasswordButton.style.display = 'none';
            }
          } else {
            console.error("ERROR: Change Password button (ID: 'changePasswordBtn') not found in the DOM!");
          }
          console.log("--- End manageChangePasswordButtonVisibility ---");
        }

        // Load classes when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            loadAndDisplayClasses();
            displayLoggedInUser(); // Also display the username
            manageStudentButtonVisibility(); // Hide buttons if student
            manageChangePasswordButtonVisibility(); // Update Change Password button visibility
        });
    </script>

</body>
</html>
