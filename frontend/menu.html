<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Days - Menu</title>
    <link rel="stylesheet" href="style.css"> <!-- Assuming you have a style.css -->
    <style>
        /* Existing styles */
        .classList {
          list-style: none;
          padding: 0;
          margin-top: 1rem;
        }
        .classList li {
          margin-bottom: 10px;
        }
        .classList a {
          display: inline-block;
          padding: 10px 25px;
          background-color: #eee;
          border: 1px solid #ccc;
          text-decoration: none;
          color: #333;
          border-radius: 5px;
          transition: background-color 0.2s ease;
        }
        .classList a:hover {
          background-color: #ddd;
        }

        /* --- Style for the Logout Button --- */
        #logoutButton {
            position: fixed;   /* Position relative to the viewport */
            top: 15px;         /* Distance from the top edge */
            right: 15px;        /* Distance from the right edge */
            padding: 8px 15px; /* Adjust padding as needed */
            cursor: pointer;
            background-color: #f0f0f0; /* Optional: style it */
            border: 1px solid #ccc;
            border-radius: 4px;
            z-index: 1000;     /* Ensure it stays on top of other content */
            /* Remove margin-left if it was previously set for inline layout */
            /* margin-left: 20px; */ /* No longer needed with fixed positioning */
        }
        /* --- End Logout Button Style --- */

        /* Remove .header-controls if it's no longer needed or adjust */
        /* .header-controls {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        } */

        /* Add some padding to the body so content doesn't start under the fixed button */
        body {
            padding-top: 60px; /* Adjust this value based on button height + desired space */
        }

    </style>
</head>
<body>

  <!-- Logout Button - Positioned via CSS now -->
  <button id="logoutButton">Logout</button>

  <h1>Color Days Counter</h1>
  <h2>Select Your Class:</h2>

    <ul class="classList">
      <!-- Add list items for each class you want -->
      <li><a href="index.html?class=C1">Class 1</a></li>
      <li><a href="index.html?class=C2">Class 2</a></li>
      <li><a href="index.html?class=C3">Class 3</a></li>
      <!-- Add more classes as needed -->
    </ul>

    <script>
        const logoutButton = document.getElementById('logoutButton'); // Get the logout button

        // --- Logout Functionality (Keep this as is) ---
        async function handleLogout() {
            console.log("Attempting logout...");
            try {
                const response = await fetch('/logout', {
                    method: 'POST',
                    credentials: 'include'
                });

                if (response.ok) {
                    console.log("Logout successful on server. Redirecting to login.");
                    window.location.href = '/login.html';
                } else {
                    const result = await response.json().catch(() => ({}));
                    console.error('Logout request failed:', response.status, result.error || 'Unknown server error');
                    alert(`Logout failed: ${result.error || 'Server error'}`);
                }
            } catch (error) {
                console.error('Error during logout fetch:', error);
                alert('An error occurred during logout. Please check your connection.');
            }
        }

        logoutButton.addEventListener('click', handleLogout);
        // --- END Logout Functionality ---
    </script>

</body>
</html>
