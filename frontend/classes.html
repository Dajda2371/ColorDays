<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-translate-key="classesTitle">Classes</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Container for Left Side Elements (User Info and Language Toggle) -->
  <div id="leftSideContainer">
    <!-- Element to display the logged-in username -->
    <div id="loggedInUser">
      <div id="profileCircle"></div>
      <span id="usernameText"></span>
    </div>
    <!-- Language Toggle -->
    <div id="languageToggle">
      <span id="toggleCs" data-lang="cs">Čeština</span>
      <span id="toggleEn" data-lang="en">English</span>
    </div>
  </div>

  <!-- Container for Header Buttons -->
  <div id="headerButtons">
    <button id="backButton" class="header-button" onclick="window.location.href='menu.html'"
      data-translate-key="backToMenuButtonText">Back to Menu</button>
    <button id="logoutButton" class="header-button" data-translate-key="logoutButtonText">Logout</button>
  </div>

  <!-- Main Content Container -->
  <div id="mainContent">
    <!-- Header removed -->

    <section class="mt-3rem">
      <h2 data-translate-key="daysHeading">Days</h2>

      <section id="monday-classes">
        <h3 data-translate-key="mondayHeader">Monday</h3>
        <!-- Buttons for Monday classes will be dynamically added here -->
      </section>

      <section id="tuesday-classes">
        <h3 data-translate-key="tuesdayHeader">Tuesday</h3>
        <!-- Buttons for Tuesday classes will be dynamically added here -->
      </section>

      <section id="wednesday-classes">
        <h3 data-translate-key="wednesdayHeader">Wednesday</h3>
        <!-- Buttons for Wednesday classes will be dynamically added here -->
      </section>
    </section>

    <section class="mt-3rem">
      <h2 data-translate-key="classCountingListHeading">Class Counting List</h2>
      <div id="auto-assign-controls" class="mb-1rem">
        <button id="split-evenly-btn" class="button" data-translate-key="splitEvenlyBtnText">Split Evenly</button>
        <button id="split-randomly-btn" class="button" data-translate-key="splitRandomlyBtnText">Split Randomly</button>
        <button id="clear-assignments-btn" class="button btn-danger" data-translate-key="clearAllBtnText">Clear All</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th data-translate-key="classHeader">Class</th>
              <th data-translate-key="mondayHeader">Monday</th>
              <th data-translate-key="tuesdayHeader">Tuesday</th>
              <th data-translate-key="wednesdayHeader">Wednesday</th>
            </tr>
          </thead>
          <tbody id="class-counting-tbody">
            <!-- Class counting data will be dynamically added here -->
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- Ensure classes.js is linked -->
  <script src="classes.js"></script>
</body>

</html>
