<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Class Schedule & Counting Links</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Class Schedule & Counting Links</h1>
  
  <section style="margin-top: 3rem;">
    <h2>Days</h2>
    
    <section id="monday-classes">
      <h3>Monday</h3>
      <!-- Buttons for Monday classes will be dynamically added here -->
    </section>

    <section id="tuesday-classes">
      <h3>Tuesday</h3>
      <!-- Buttons for Tuesday classes will be dynamically added here -->
    </section>

    <section id="wednesday-classes">
      <h3>Wednesday</h3>
      <!-- Buttons for Wednesday classes will be dynamically added here -->
    </section>
  </section>

  <section style="margin-top: 3rem;">
    <h2>Class Counting List</h2>
    <table>
      <thead>
        <tr>
          <th>Class</th>
          <th>Monday</th>
          <th>Tuesday</th>
          <th>Wednesday</th>
        </tr>
      </thead>
      <tbody id="class-counting-tbody">
        <!-- Class counting data will be dynamically added here -->
      </tbody>
    </table>
  </section>
  <p style="margin-top: 2rem;"><a href="menu.html">Back to Class Selection</a></p>

  <!-- Ensure classes.js is linked -->
  <script src="classes.js"></script>
</body>
</html>
