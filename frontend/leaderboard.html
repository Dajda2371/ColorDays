<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-translate-key="leaderboardButtonText">Color Days - Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Container for Left Side Elements (User Info and Language Toggle) -->
  <div id="leftSideContainer">
    <!-- Element to display the logged-in username -->
    <div id="loggedInUser">
      <div id="profileCircle"></div>
      <span id="usernameText"></span>
    </div>
    <!-- Language Toggle -->
    <div id="languageToggle">
      <span id="toggleCs" data-lang="cs">Čeština</span>
      <span id="toggleEn" data-lang="en">English</span>
    </div>
  </div>

  <!-- Container for Header Buttons -->
  <div id="headerButtons">
    <button id="backButton" class="header-button" onclick="window.location.href='menu.html'"
      data-translate-key="backToMenuButtonText">Back to Menu</button>
    <button id="logoutButton" class="header-button" data-translate-key="logoutButtonText">Logout</button>
  </div>

  <!-- Main Content Container -->
  <div id="mainContent">
    <h1 data-translate-key="leaderboardHeading">Leaderboard</h1>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th data-translate-key="rankHeader">Rank</th>
            <th data-translate-key="classHeader">Class</th>
            <th data-translate-key="percentageHeader">Percentage</th>
            <th data-translate-key="scoreHeader">Score</th>
            <th data-translate-key="stateHeader" colspan="3">State</th>
          </tr>
        </thead>
        <tbody id="leaderboardTable">
          <tr>
            <td colspan="4" data-translate-key="loadingText">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="leaderboard.js"></script>
</body>

</html>
