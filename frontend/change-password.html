<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - Color Days</title>
  <link rel="stylesheet" href="style.css"> <!-- Optional: Link to your existing style -->
</head>

<body>
  <!-- Container for Left Side Elements (User Info and Language Toggle) -->
  <div id="leftSideContainer">
    <!-- Element to display the logged-in username -->
    <div id="loggedInUser">
      <div id="profileCircle"></div>
      <span id="usernameText"></span>
    </div>
    <!-- Language Toggle -->
    <div id="languageToggle">
      <span id="toggleCs" data-lang="cs">Čeština</span>
      <span id="toggleEn" data-lang="en">English</span>
    </div>
  </div>

  <!-- Container for Header Buttons -->
  <div id="headerButtons">
    <button id="backButton" class="header-button" onclick="window.location.href='menu.html'"
      data-translate-key="backToMenuButtonText">Back to Menu</button>
    <button id="logoutButton" class="header-button" data-translate-key="logoutButtonText">Logout</button>
  </div>

  <!-- Main Content Container -->
  <div id="mainContent">
    <div id="login-sections-container">
      <section>
        <h2 data-translate-key="changePasswordButtonText">Change Password</h2>
        <form id="changePasswordForm">
          <div id="oldPasswordContainer"> <!-- Added ID here -->
            <label for="old_password">Old password:</label>
            <input type="password" id="old_password" name="old_password">
          </div>
          <div>
            <label for="password">New password:</label>
            <input type="password" id="new_password" name="new_password" required>
          </div>
          <button type="submit" class="btn-primary">Change Password</button>
        </form>
        <div id="error-message"></div>
      </section>
    </div>
  </div>

  <script src="change-password.js"></script>
</body>

</html>
